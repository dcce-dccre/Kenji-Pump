<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍼 Pumping Tracker</title>
    <style>
        :root { --primary: #ff8fa3; --bg: #fff0f3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ff8fa3; border-radius: 10px; font-size: 1rem; }
        .flex-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .log-item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>🍼 Kenji Pump Log</h2>
    <form id="pumpForm">
        <div class="form-group">
            <label>ปริมาณ (ml/oz)</label>
            <div class="flex-group">
                <input type="number" id="amount" required>
                <select id="unit"><option value="ml">ml</option><option value="oz">oz</option></select>
            </div>
        </div>
        <div class="form-group"><label>ครั้งที่</label><input type="number" id="sessionNum" required></div>
        <div class="form-group"><label>วัน-เวลา</label><input type="datetime-local" id="pumpTime" required></div>
        <div class="form-group"><label>เครื่องปั๊ม</label><input type="text" id="pumpType"></div>
        <div class="form-group"><label>ขนาดกรวย (mm)</label><input type="text" id="flangeSize"></div>
        <button type="submit" id="btnSave">บันทึกข้อมูล</button>
    </form>
    <div id="logList" style="margin-top: 20px;">กำลังโหลด...</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyBgh8Ba-wO5_pLzE6XG2JAEzC8Po4GEsniw843IhZ8LHX4WA4BFm2LkmKCpmn0ZnNj/exec"; 

    function setDefaults() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('pumpTime').value = now.toISOString().slice(0, 16);
    }

    document.getElementById('pumpForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true; btn.innerText = "⏳ กำลังบันทึก...";

        const data = {
            id: Date.now(),
            time: document.getElementById('pumpTime').value,
            session: document.getElementById('sessionNum').value,
            amount: document.getElementById('amount').value,
            unit: document.getElementById('unit').value,
            pumpType: document.getElementById('pumpType').value || '-',
            flangeSize: document.getElementById('flangeSize').value || '-'
        };

        try {
            await fetch(SCRIPT_URL + "?" + new URLSearchParams(data).toString());
            alert("บันทึกสำเร็จ!");
            document.getElementById('amount').value = "";
            loadData();
        } catch (error) { alert("บันทึกพลาด: " + error.message); }
        finally { btn.disabled = false; btn.innerText = "บันทึกข้อมูล"; }
    });

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const rows = await res.json();
            const logList = document.getElementById('logList');
            logList.innerHTML = '<h3>ประวัติย้อนหลัง</h3>';
            
            // ใช้ slice(1) เพื่อข้ามหัวตาราง แล้ว reverse ให้ล่าสุดขึ้นก่อน
            rows.slice(1).reverse().forEach(row => {
                // row: [0:time, 1:session, 2:amount, 3:unit, 4:type, 5:flange, 6:id]
                logList.innerHTML += `
                    <div class="log-item">
                        <div><b>รอบที่ ${row[1]}</b> (${row[4]})<br><small>${row[0].substring(5, 16)}</small></div>
                        <div style="font-size:1.1rem; color:#ff5c7a;">${row[2]} ${row[3]} <br> <small style="color:gray">${row[5]}mm</small></div>
                    </div>`;
            });
        } catch (e) { document.getElementById('logList').innerHTML = "โหลดข้อมูลพลาด"; }
    }

    setDefaults();
    loadData();
</script>
</body>
</html>

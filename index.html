<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍼 Pumping Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #ff8fa3; 
            --primary-hover: #ff758f;
            --bg: #fff0f3; 
            --text: #4a5568;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { 
            width: 100%; max-width: 500px; background: white; 
            padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(255, 143, 163, 0.2); 
        }
        h2 { text-align: center; color: #ff5c7a; margin-bottom: 20px; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--text); }
        
        /* ปรับขนาดช่องกรอกให้ใหญ่สะใจ */
        input, select { 
            width: 100%; 
            padding: 18px; 
            border: 2px solid #ff8fa3; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            outline: none;
        }
        input:focus { border-color: #ff5c7a; }
        
        .flex-group { display: flex; gap: 10px; }
        #amount { flex: 3; } 
        #unit { flex: 1; }
        
        button { 
            width: 100%; padding: 18px; background-color: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #cbd5e0; }

        .log-list { margin-top: 25px; max-height: 400px; overflow-y: auto; }
        .log-item { 
            background: white; padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍼 บันทึกการปั๊มนม</h2>
    <form id="pumpForm">
        <div class="form-group">
            <label>ปริมาณที่ปั๊ม</label>
            <div class="flex-group">
                <input type="number" id="amount" inputmode="decimal" step="0.1" placeholder="0" required>
                <select id="unit"><option value="ml">ml</option><option value="oz">oz</option></select>
            </div>
        </div>
        <div class="form-group"><label>ครั้งที่</label><input type="number" id="sessionNum" required></div>
        <div class="form-group"><label>วัน-เวลา</label><input type="datetime-local" id="pumpTime" required></div>
        <div class="form-group"><label>เครื่องปั๊ม / กรวย</label><input type="text" id="pumpType" placeholder="เช่น คู่ไฟฟ้า / 24mm"></div>
        <button type="submit" id="btnSave">บันทึกข้อมูล</button>
    </form>
    <div class="log-list" id="logList">กำลังโหลดข้อมูล...</div>
</div>

<script>
    // *** วาง Web App URL ตัวล่าสุดที่นี่ ***
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJ4PwBsOoKd4ZcCAlohkwZ4ulL33CCA0dy4qeDRlUIRdIhrswmZ-LKJXwLZzrDA-wy/exec"; 

    function setDefaults() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('pumpTime').value = now.toISOString().slice(0, 16);
    }

    document.getElementById('pumpForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true; btn.innerText = "⏳ กำลังบันทึก...";

        const data = {
            id: Date.now(),
            time: document.getElementById('pumpTime').value,
            session: document.getElementById('sessionNum').value,
            amount: document.getElementById('amount').value,
            unit: document.getElementById('unit').value,
            pumpType: document.getElementById('pumpType').value || '-'
        };

        const params = new URLSearchParams(data).toString();

        try {
            await fetch(SCRIPT_URL + "?" + params);
            alert("บันทึกสำเร็จ!");
            document.getElementById('amount').value = "";
            loadData();
        } catch (error) {
            alert("บันทึกพลาด: " + error.message);
        } finally {
            btn.disabled = false; btn.innerText = "บันทึกข้อมูล";
        }
    });

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const rows = await res.json();
            const logList = document.getElementById('logList');
            logList.innerHTML = '';
            rows.slice(1).reverse().forEach(row => {
                logList.innerHTML += `
                    <div class="log-item">
                        <div><b>รอบที่ ${row[1]}</b><br><small>${row[0].substring(5, 16)}</small></div>
                        <div style="font-size: 1.2rem; font-weight: bold; color: #ff5c7a;">${row[2]} ${row[3]}</div>
                    </div>`;
            });
        } catch (e) { document.getElementById('logList').innerHTML = "โหลดข้อมูลไม่ได้"; }
    }

    setDefaults();
    loadData();
</script>
</body>
</html>

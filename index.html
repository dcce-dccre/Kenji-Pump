<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍼 บันทึกการปั๊มนม (GET Method)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff8fa3; --bg: #fff0f3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #ff5c7a; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ffe3e8; border-radius: 10px; }
        .flex-group { display: flex; gap: 10px; }
        .flex-group input { flex: 2; }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .log-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .log-item { background: #f7fafc; padding: 10px; border-radius: 10px; margin-bottom: 5px; border: 1px solid #edf2f7; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍼 Kenji Pump Log</h2>
    <form id="pumpForm">
        <div class="form-group">
            <label>ปริมาณ (ml/oz)</label>
            <div class="flex-group">
                <input type="number" id="amount" required>
                <select id="unit"><option value="ml">ml</option><option value="oz">oz</option></select>
            </div>
        </div>
        <div class="form-group"><label>ครั้งที่</label><input type="number" id="sessionNum" required></div>
        <div class="form-group"><label>วัน-เวลา</label><input type="datetime-local" id="pumpTime" required></div>
        <div class="form-group"><label>เครื่องปั๊ม</label><input type="text" id="pumpType"></div>
        <div class="form-group"><label>กรวย</label><input type="text" id="flangeSize"></div>
        <button type="submit" id="btnSave">บันทึกข้อมูล</button>
    </form>
    <div class="log-list" id="logList">กำลังโหลด...</div>
</div>

<script>
    // *** วาง Web App URL ตัวล่าสุด (ที่กด Deploy ใหม่จาก doGet) ที่นี่ ***
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjQ-GtYpzht76Pd8zoDo1CIqz9FiWb6tZrITvl-aVAcRnpnfN-zhVNS1Z2_9mO2FUw/exec"; 

    function setDefaults() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('pumpTime').value = now.toISOString().slice(0, 16);
    }

    document.getElementById('pumpForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true; btn.innerText = "⏳ กำลังส่ง...";

        // สร้างข้อมูล
        const data = {
            id: Date.now(),
            time: document.getElementById('pumpTime').value,
            session: document.getElementById('sessionNum').value,
            amount: document.getElementById('amount').value,
            unit: document.getElementById('unit').value,
            pumpType: document.getElementById('pumpType').value || '-',
            flangeSize: document.getElementById('flangeSize').value || '-'
        };

        // สร้าง Query String สำหรับ GET
        const params = new URLSearchParams(data).toString();

        try {
            // เรียกใช้ด้วย GET
            await fetch(SCRIPT_URL + "?" + params);
            alert("บันทึกสำเร็จ!");
            document.getElementById('amount').value = "";
            setDefaults();
            loadData();
        } catch (error) {
            alert("บันทึกพลาด: " + error.message);
        } finally {
            btn.disabled = false; btn.innerText = "บันทึกข้อมูล";
        }
    });

    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const rows = await res.json();
            const logList = document.getElementById('logList');
            logList.innerHTML = '';
            rows.slice(1).reverse().forEach(row => {
                logList.innerHTML += `<div class="log-item"><b>${row[0]}</b> | ${row[2]} ${row[3]}</div>`;
            });
        } catch (e) { document.getElementById('logList').innerHTML = "โหลดพลาด"; }
    }

    setDefaults();
    loadData();
</script>
</body>
</html>

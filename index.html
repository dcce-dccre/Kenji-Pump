<script>
    // *** วาง Web App URL ที่ได้จาก Google Script ตรงนี้ ***
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzj4c0wisDP_uMayoL9e5qqj1mzOppsvIWHqZoQhABTjA-AERcCMWZ6Ox6HrIFmQXXi/exec"; 
    
    let myChart = null; // ตัวแปรเก็บกราฟ

    function setDefaults() {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        document.getElementById('pumpTime').value = (new Date(now - offset)).toISOString().slice(0, 16);
    }

    document.getElementById('pumpForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = "⏳ กำลังส่งข้อมูลขึ้น Cloud...";

        const dataPayload = {
            id: Date.now().toString(),
            time: document.getElementById('pumpTime').value,
            session: document.getElementById('sessionNum').value,
            amount: document.getElementById('amount').value,
            unit: document.getElementById('unit').value,
            pumpType: document.getElementById('pumpType').value || '-',
            flangeSize: document.getElementById('flangeSize').value || '-'
        };

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(dataPayload)
            });
            
            document.getElementById('amount').value = "";
            setDefaults();
            
            // เปลี่ยนข้อความเพื่อบอกให้รอ Google ประมวลผล
            document.getElementById('logList').innerHTML = '<div class="loading-text">⏳ กำลังจัดเรียงประวัติและสร้างกราฟ...</div>';
            
            // หน่วงเวลา 1.5 วินาที ให้ Google Sheets เขียนเสร็จ แล้วค่อยดึงข้อมูล
            setTimeout(() => {
                loadData();
                btn.disabled = false;
                btn.innerText = "บันทึกข้อมูลขึ้น Cloud";
                alert("บันทึกสำเร็จ!");
            }, 1500);

        } catch (error) {
            alert("บันทึกไม่สำเร็จ: " + error.message);
            btn.disabled = false;
            btn.innerText = "บันทึกข้อมูลขึ้น Cloud";
        }
    });

    async function loadData() {
        const logList = document.getElementById('logList');
        try {
            // เพิ่ม ?t=... ต่อท้าย URL เพื่อบังคับไม่ให้มือถือใช้ข้อมูลเก่า (Cache Buster)
            const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
            const rows = await res.json();
            displayLogsAndDashboard(rows);
        } catch (e) {
            logList.innerHTML = '<div class="loading-text">โหลดข้อมูลไม่สำเร็จ กรุณากดรีเฟรชหน้าเว็บ</div>';
        }
    }

    function displayLogsAndDashboard(rows) {
        const logList = document.getElementById('logList');
        const dashboard = document.getElementById('dashboardSection');
        logList.innerHTML = '';

        if (!rows || rows.length <= 1) {
            logList.innerHTML = '<div class="loading-text">ยังไม่มีประวัติการบันทึก</div>';
            document.getElementById('sessionNum').value = 1;
            return;
        }

        dashboard.style.display = 'block';
        const logs = rows.slice(1).sort((a, b) => new Date(b[0]) - new Date(a[0]));
        const todayStr = new Date().toLocaleDateString('th-TH');
        
        let totalMlToday = 0;
        let sessionCountToday = 0;
        let dailyTotals = {}; 

        logs.forEach(row => {
            const logDateObj = new Date(row[0]);
            const logDateStr = logDateObj.toLocaleDateString('th-TH');
            const shortDateStr = logDateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
            
            let amount = parseFloat(row[2]) || 0;
            const unit = row[3];
            
            let amountInMl = (unit === 'oz') ? amount * 29.5735 : amount;

            if (logDateStr === todayStr) {
                sessionCountToday++;
                totalMlToday += amountInMl;
            }

            if (!dailyTotals[shortDateStr]) dailyTotals[shortDateStr] = 0;
            dailyTotals[shortDateStr] += amountInMl;

            const formattedTime = logDateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute:'2-digit' });
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `
                <div class="log-header">
                    <span>รอบที่ ${row[1]} ⏳ ${formattedTime} น. (${shortDateStr})</span>
                    <span style="color:#ff5c7a;">${amount} ${unit}</span>
                </div>
                <div class="log-details">เครื่องปั๊ม: ${row[4]} | กรวย: ${row[5]}</div>
            `;
            logList.appendChild(item);
        });

        let displayTotalToday = totalMlToday;
        let displayUnit = "ml";
        
        // ถ้าคุณพ่อต้องการให้สรุปเป็น oz ให้ใช้บรรทัดล่างนี้แทนครับ
        // displayTotalToday = totalMlToday / 29.5735; displayUnit = "oz";

        document.getElementById('statTodayTotal').innerText = `${displayTotalToday.toFixed(0)} ${displayUnit}`;
        document.getElementById('statTodayCount').innerText = `${sessionCountToday} รอบ`;
        document.getElementById('sessionNum').value = sessionCountToday + 1;

        const datesArray = Object.keys(dailyTotals).reverse().slice(-7);
        const amountsArray = datesArray.map(date => dailyTotals[date].toFixed(0));

        renderChart(datesArray, amountsArray);
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('pumpChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'ปริมาณนม (ml)',
                    data: data,
                    backgroundColor: 'rgba(255, 143, 163, 0.6)',
                    borderColor: '#ff5c7a',
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } },
                plugins: { legend: { display: false } }
            }
        });
    }

    setDefaults();
    loadData();
</script>
